<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมฝึกพิมพ์ตามเนื้อเรื่อง - เสืออำนาจ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-image: url('https://img.freepik.com/free-vector/old-book-with-mushrooms-dark-forest_107791-17725.jpg');
            background-size: cover;
            background-position: center;
        }
        .story-container {
             background-color: rgba(255, 255, 255, 0.95);
             backdrop-filter: blur(5px);
        }
        #story-display {
            user-select: none;
        }
        .correct {
            color: #10B981; /* green-500 */
        }
        #story-image {
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        #typing-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            padding: 0;
            border: 0;
            margin: 0;
            font-size: 16px; /* prevent iOS auto-zoom which can also drop focus */
        }
    </style>
</head>
<body class="bg-gray-800 text-slate-800 flex items-center justify-center min-h-screen p-4">

    <div class="story-container w-full max-w-3xl mx-auto rounded-2xl shadow-lg p-6 md:p-8" onclick="document.getElementById('typing-area').focus();">
        
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-2 text-center">นิทานเสืออำนาจ</h1>
        <p class="text-slate-500 mb-2 text-center">คลิกที่นี่แล้วเริ่มพิมพ์ได้เลย</p>

        <!-- Time Display -->
        <div class="text-center mb-4">
            <span class="text-slate-500 text-lg">เวลา:</span>
            <span id="time-display" class="text-2xl font-bold text-sky-600">0</span>
            <span class="text-slate-500 text-lg">วินาที</span>
        </div>

        <!-- Story Image -->
        <div id="image-container" class="mb-4 bg-slate-200 rounded-lg overflow-hidden">
            <img id="story-image" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='600' height='338' viewBox='0 0 600 338'%3E%3Crect width='600' height='338' fill='%23e2e8f0'/%3E%3Ctext x='50%25' y='50%25' font-family='sans-serif' font-size='28' fill='%2394a3b8' text-anchor='middle' dominant-baseline='middle'%3E%E0%B9%80%E0%B8%A3%E0%B8%B4%E0%B9%88%E0%B8%A1%E0%B8%99%E0%B8%B4%E0%B8%97%E0%B8%B2%E0%B8%99%3C/text%3E%3C/svg%3E" alt="ภาพประกอบเรื่องราว" class="w-full h-auto transition-opacity duration-500">
        </div>

        <!-- Story Display -->
        <div id="story-display" class="bg-slate-100 rounded-lg p-6 mb-6 text-2xl leading-relaxed border-2 border-slate-200 min-h-[100px]">
            <!-- Story text will appear here -->
        </div>

        <!-- Typing Area (Hidden) -->
        <textarea id="typing-area" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

        <!-- Game Controls & Message -->
        <div id="message-area" class="mt-6 h-16 flex items-center justify-center">
             <button id="start-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-8 rounded-lg text-xl transition-transform transform hover:scale-105">
                เริ่มนิทาน
            </button>
        </div>

    </div>

    <script>
        // DOM Elements
        const storyDisplay = document.getElementById('story-display');

        // The Story
        const story = [
            "กาลครั้งหนึ่งเมื่อนานมาแล้ว มีเสือตัวหนึ่งที่ป่าหิมพาน มันทั้งน่ากลัวและน่าเกรงขามมากในป่าแห่งนี้ เจ้าเสือตัวนี้มันมีชื่อว่า อำนาจ มันชอบทำตัวเป็นเจ้าแห่งป่า มันไม่ชอบออกหาอาหาร วันๆ มันจะนอนรอคอยบริวารนำอาหารมาให้ถึงหน้าถ้ำ",
            "บริวารของเจ้าเสือตัวนี้ คือ ลิง ชนี กระรอก พวกมันมีหน้าที่ในการบริการเจ้าอำนาจ ทั้งบีบ นวด หาอาหารจนตัวเองผอมแห้ง อาหารที่หามาได้จะนำมาให้เจ้าอำนาจทั้งหมด จนตัวมันเองไม่ได้กินอะไร พวกมันยอมเจ้าอำนาจทุกอย่าง",
            "เช้าวันหนึ่งบริวารพวกนี้พยายามหาอาหารในป่า แต่อาหารในวันนั้นไม่มีเหลือให้มันนำไปให้เจ้าอำนาจ พวกมันทั้งเหนื่อยและหิว เดินคอตกมาหาเจ้าอำนาจ พอเจ้าอำนาจมองไปที่บริวารของมันที่มามือเปล่า ไม่มีอาหารติดมือมาด้วย ทำให้เจ้าอำนาจหงุดหงิดมาก",
            "ด้วยความกระหาย และหิว เจ้าอำนาจไม่ยอมฟังอะไรเลย มันวิ่งไปตะปมเจ้าลิง ชนี และกระรอก กินทีละตัวอย่างอร่อยจนพุงกาง"

        // Game state variables
        let currentPage = 0;
        let isPlaying = false;
        let timerInterval;
        let elapsedTime = 0;

        // --- Event Listeners ---
        startBtn.addEventListener('click', startGame);
        typingArea.addEventListener('input', checkTyping);

        // Keep the hidden textarea (and thus the mobile keyboard) focused while playing.
        // Some mobile browsers blur a near-invisible input right after the first keystroke;
        // this nudges focus back so typing can continue uninterrupted.
        typingArea.addEventListener('blur', () => {
            if (isPlaying) {
                setTimeout(() => typingArea.focus(), 10);
            }
        });

        // --- Game Logic Functions ---

        function startGame() {
            isPlaying = true;
            currentPage = 0;
            typingArea.value = '';
            typingArea.focus();
            startBtn.style.display = 'none';
            messageArea.innerHTML = '';
            
            elapsedTime = 0;
            timeDisplay.textContent = elapsedTime;
            startTimer();
            
            loadPage(currentPage);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedTime++;
                timeDisplay.textContent = elapsedTime;
            }, 1000);
        }

        function loadPage(pageIndex) {
            if (pageIndex >= story.length) {
                endGame();
                return;
            }
            storyImage.style.opacity = '0';
            setTimeout(() => {
                storyImage.src = images[pageIndex];
                storyImage.style.opacity = '1';
            }, 300);

            const currentText = story[pageIndex];
            storyDisplay.innerHTML = `<span>${currentText}</span>`;
            typingArea.value = '';
            typingArea.focus();
            
            messageArea.innerHTML = '';
        }

        function checkTyping() {
            if (!isPlaying) return;

            const storyText = story[currentPage];
            const typedText = typingArea.value;
            
            let mistakeFoundAt = -1;
            for (let i = 0; i < typedText.length; i++) {
                if (typedText[i] !== storyText[i]) {
                    mistakeFoundAt = i;
                    break;
                }
            }

            if (mistakeFoundAt !== -1) {
                typingArea.value = typedText.substring(0, mistakeFoundAt);
                return;
            }
            
            const correctPart = storyText.substring(0, typedText.length);
            const remainingPart = storyText.substring(typedText.length);
            storyDisplay.innerHTML = `<span class="correct">${correctPart}</span><span>${remainingPart}</span>`;

            if (typedText === storyText) {
                clearInterval(timerInterval); // <-- Pause the timer here
                messageArea.innerHTML = `
                    <button id="next-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-8 rounded-lg text-xl transition-transform transform hover:scale-105">
                        หน้าต่อไป &rarr;
                    </button>
                `;
                document.getElementById('next-btn').addEventListener('click', nextPage);
                document.getElementById('next-btn').focus();
            }
        }
        
        function nextPage() {
            currentPage++;
            // Check if the next page is the end of the story
            if (currentPage < story.length) {
                startTimer(); // <-- Resume timer for the next page
                loadPage(currentPage);
            } else {
                loadPage(currentPage); // This will call endGame
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            
            storyImage.style.opacity = '0';
            setTimeout(() => {
                storyImage.src = endImage;
                storyImage.style.opacity = '1';
            }, 300);

            storyDisplay.innerHTML = `<p class="text-center font-bold">~ จบแล้วจ้า ~</p>`;
            messageArea.innerHTML = `
                <div class="flex flex-col items-center">
                    <p class="text-xl mb-2">คุณใช้เวลาไปทั้งหมด <span class="font-bold text-sky-600">${elapsedTime}</span> วินาที</p>
                    <p class="text-xl mb-4">คุณได้เรียนรู้ข้อคิดดีๆ จากนิทานเรื่องนี้</p>
                    <button id="restart-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-8 rounded-lg text-xl transition-transform transform hover:scale-105">
                        เล่นอีกครั้ง
                    </button>
                </div>
            `;
            document.getElementById('restart-btn').addEventListener('click', startGame);
        }

    </script>
